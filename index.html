<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .currency-row {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .currency-label {
            width: 100px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 150px;
            padding: 5px;
            font-size: 16px;
            text-align: right;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
        }
        input.result {
            background-color: #fffde7;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-top: -10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Currency Converter</h1>
    <div class="subtitle" id="rate-date">(Rates updated daily)</div>
    <div id="currency-container">
        <div class="currency-row">
            <span class="currency-label">EUR =</span>
            <input type="text" id="EUR" placeholder="000,000.00" inputmode="decimal">
        </div>
        <div class="currency-row">
            <span class="currency-label">RMB =</span>
            <input type="text" id="RMB" placeholder="000,000.00" inputmode="decimal">
        </div>
        <div class="currency-row">
            <span class="currency-label">INR =</span>
            <input type="text" id="INR" placeholder="000,000.00" inputmode="decimal">
        </div>
        <div class="currency-row">
            <span class="currency-label">SGD =</span>
            <input type="text" id="SGD" placeholder="000,000.00" inputmode="decimal">
        </div>
        <div class="currency-row">
            <span class="currency-label">USD =</span>
            <input type="text" id="USD" placeholder="000,000.00" inputmode="decimal">
        </div>
    </div>
    <div id="error-message" class="error"></div>

    <script>
        // Rates are fetched by GitHub Actions (fetch_rates.py) using a secret API key
        // and cached in data/rates.json — the API key never appears in this file.
        let cachedRates = null;   // { EUR, CNY, INR, SGD, USD } all relative to USD

        async function loadRates() {
            const resp = await fetch('./data/rates.json?v=' + Date.now());
            if (!resp.ok) throw new Error('Could not load rates');
            const data = await resp.json();
            if (!data.rates) throw new Error('Invalid rates file');
            cachedRates = data.rates;
            cachedRates.USD = 1;  // base is USD
            if (data.last_update) {
                document.getElementById('rate-date').textContent =
                    `Rates as of ${data.last_update}`;
            }
        }

        const inputs = document.querySelectorAll('input[type="text"]');
        const errorMessage = document.getElementById('error-message');

        inputs.forEach(input => {
            input.addEventListener('keypress', async function(event) {
                if (event.key === 'Enter') {
                    const value = parseFloat(input.value.replace(/,/g, ''));
                    if (!isNaN(value)) await performConversion(input.id, value);
                }
            });
            input.addEventListener('blur', async function() {
                const value = parseFloat(input.value.replace(/,/g, ''));
                if (!isNaN(value)) await performConversion(input.id, value);
            });
            input.addEventListener('click', function() {
                inputs.forEach(inp => { inp.value = ''; inp.classList.remove('result'); });
                errorMessage.textContent = '';
            });
            input.addEventListener('input', function() {
                this.classList.remove('result');
            });
        });

        async function performConversion(sourceCurrency, amount) {
            try {
                if (!cachedRates) await loadRates();
                convertCurrency(sourceCurrency, amount);
                inputs.forEach(inp => inp.classList.add('result'));
                document.getElementById(sourceCurrency).classList.remove('result');
                errorMessage.textContent = '';
            } catch (error) {
                errorMessage.textContent = 'Error loading exchange rates. Please try again later.';
                console.error(error);
            }
        }

        function convertCurrency(sourceCurrency, amount) {
            const currencyMap = { RMB: 'CNY', EUR: 'EUR', INR: 'INR', SGD: 'SGD', USD: 'USD' };
            const sourceApi = currencyMap[sourceCurrency];
            const sourceRate = cachedRates[sourceApi];
            if (!sourceRate) throw new Error('No rate for ' + sourceCurrency);

            // Convert source amount to USD, then to each target
            const amountInUSD = amount / sourceRate;

            Object.keys(currencyMap).forEach(targetCurrency => {
                const targetRate = cachedRates[currencyMap[targetCurrency]];
                const converted = amountInUSD * (targetRate || 1);
                document.getElementById(targetCurrency).value = formatNumber(converted);
            });
            document.getElementById(sourceCurrency).value = formatNumber(amount);
        }

        function formatNumber(number) {
            const parts = number.toFixed(2).split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return parts.join('.');
        }

        // Load rates on page load
        loadRates().catch(() => {
            errorMessage.textContent = 'Rates unavailable — enter a value to retry.';
        });
    </script>
</body>
</html>
